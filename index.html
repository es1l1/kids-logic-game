<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغامرة الذكاء الخمسة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="icon" href="https://img.icons8.com/fluency/48/rocket.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-overlay" class="overlay">
        <div class="glass-card animate__animated animate__fadeInDown">
            <div class="hero-icon">🚀</div>
            <h1>مغامرة العباقرة الصغار</h1>
            <p>هل يمكنك اجتياز الـ 5 تحديات الكبرى؟</p>
            <button class="main-btn" onclick="GameEngine.start()">ابدأ المغامرة الآن</button>
        </div>
    </div>

    <div id="game-container" class="container">
        <header class="game-header">
            <div class="stars-track" id="stars-track">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="score-pill">النقاط: <span id="score-val">0</span></div>
        </header>

        <main id="game-card" class="game-card">
            <div id="timer-bar"><div id="timer-fill"></div></div>
            <h2 id="mission-title">المهمة الأولى</h2>
            <h1 id="target-name">...</h1>
            
            <div id="options-grid" class="grid"></div>
            
            <div id="feedback-area"></div>
        </main>
    </div>

    <div id="win-screen" class="overlay" style="display: none;">
        <div class="glass-card">
            <div class="hero-icon">🏆</div>
            <h1>أنت عبقري حقيقي!</h1>
            <p>لقد أنهيت جميع المستويات الخمسة بنجاح</p>
            <div class="final-score">مجموع نقاطك: <span id="final-score-val">0</span></div>
            <button class="main-btn" onclick="location.reload()">إعادة التحدي 🔄</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
